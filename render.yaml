services:
  - type: web
    name: hr-chatbot-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hr-chatbot-db
          property: connectionString
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: INITIAL_ADMIN_NAME
        value: System Admin
      - key: INITIAL_ADMIN_EMPLOYEE_ID
        value: ADMIN001
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: hr-chatbot
      - key: PINECONE_ENVIRONMENT
        value: us-east-1
      - key: PINECONE_CLOUD
        value: aws
      - key: EMBEDDING_MODEL
        value: llama-text-embed-v2
      - key: EMBEDDING_DIMENSION
        value: 1024
      - key: MAX_UPLOAD_SIZE
        value: 10485760
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: hr-chatbot-db
    plan: starter
    databaseName: hr_chatbot
    user: hr_chatbot_user
